<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Test</title>
<style>
body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#1e40af;margin:0}
.box{background:#fff;padding:40px;border-radius:16px;width:340px}
h2{margin-bottom:20px;text-align:center}
input{width:100%;padding:12px;margin-bottom:12px;border:2px solid #ddd;border-radius:8px;font-size:15px;box-sizing:border-box}
button{width:100%;padding:13px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
#msg{color:red;margin-top:10px;text-align:center;font-size:14px}
</style>
</head>
<body>
<div class="box">
  <h2>Sambhi Mobiles Admin</h2>
  <input type="text" id="u" placeholder="Username" value="amrik">
  <input type="password" id="p" placeholder="Password" value="amrik1234">
  <button onclick="go()">Login</button>
  <div id="msg"></div>
</div>
<script>
var USERS = [
  {u:"amrik",    p:"amrik1234",   name:"Amrik Singh", role:"Owner"},
  {u:"manager1", p:"manager1234", name:"Manager 1",   role:"Manager"},
  {u:"exec1",    p:"exec1234",    name:"Executive 1", role:"Executive"}
];
function go(){
  var u=document.getElementById("u").value.trim().toLowerCase();
  var p=document.getElementById("p").value.trim();
  var found=null;
  for(var i=0;i<USERS.length;i++){
    if(USERS[i].u===u && USERS[i].p===p){found=USERS[i];break;}
  }
  if(!found){document.getElementById("msg").textContent="Wrong credentials";return;}
  localStorage.setItem("smb_logged",JSON.stringify({u:found.u,name:found.name,role:found.role,ts:Date.now()}));
  window.location.href="admin_main.html";
}
// Auto-check
var sess=localStorage.getItem("smb_logged");
if(sess){try{var s=JSON.parse(sess);if(s&&Date.now()-s.ts<43200000)window.location.href="admin_main.html";}catch(e){}}
</script>
</body>
</html>
